# =====================================================
# Toolbox Everything — docker-compose.yml (unifié)
#
# Deux modes, un seul fichier :
#
#   1) BUILD LOCAL (dev, CI) :
#        docker compose up -d --build
#
#   2) IMAGE GHCR (prod) :
#        export TOOLBOX_IMAGE=ghcr.io/doalou/toolbox_everything:1.3.1
#        docker compose pull
#        docker compose up -d
#
# Si TOOLBOX_IMAGE n'est pas défini, le tag local
# `toolbox-everything:${APP_VERSION}` est utilisé et la
# section build prend le relais.
# =====================================================

services:
  toolbox:
    image: ${TOOLBOX_IMAGE:-ghcr.io/doalou/toolbox_everything:${APP_VERSION:-1.3.1}}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.3.1}
    container_name: toolbox-everything
    ports:
      - "${TOOLBOX_PORT:-8000}:8000"
    volumes:
      - toolbox_uploads:/app/uploads
      - toolbox_downloads:/app/downloads
      - toolbox_logs:/app/logs
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=${FLASK_ENV:-production}
      - PYTHONUNBUFFERED=1
      - APP_VERSION=${APP_VERSION:-1.3.1}
      # URL interne (réseau Docker) utilisée par le healthcheck /health
      - STIRLING_PDF_URL=${STIRLING_PDF_URL:-http://stirling-pdf:8080}
      # URL publique utilisée par l'iframe côté navigateur
      - STIRLING_PDF_PUBLIC_URL=${STIRLING_PDF_PUBLIC_URL:-http://localhost:8080}
      # LibreSpeed : URL interne + URL publique iframe
      - LIBRESPEED_URL=${LIBRESPEED_URL:-http://librespeed}
      - LIBRESPEED_PUBLIC_URL=${LIBRESPEED_PUBLIC_URL:-http://localhost:8081}
      # Rate limiter : Redis partagé entre les workers gunicorn
      - RATELIMIT_STORAGE_URI=${RATELIMIT_STORAGE_URI:-redis://redis:6379/0}
    depends_on:
      stirling-pdf:
        condition: service_started
      librespeed:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - toolbox_network
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------
  # Stirling PDF — configuré en mode AMNÉSIQUE (instance publique).
  #
  # - Aucune donnée utilisateur persistée : /configs et /logs sont
  #   en tmpfs (RAM) et effacés à chaque restart du container.
  # - Aucune analytics/télémétrie (PostHog, Scarf, Google).
  # - Fichiers temporaires nettoyés agressivement (1h max, cycle 5min).
  # - Pas d'audit log, pas d'URL-to-PDF (risque SSRF), pas de storage
  #   utilisateur.
  # - Seul le volume `stirling_tessdata` est persistant (modèles OCR
  #   de Tesseract, données statiques — pas des documents utilisateur).
  # ---------------------------------------------------------------
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: toolbox-stirling-pdf
    ports:
      - "${STIRLING_PORT:-8080}:8080"
    environment:
      # --- Sécurité / authentification ---
      - DOCKER_ENABLE_SECURITY=false
      - SECURITY_ENABLELOGIN=false
      # X-Frame-Options auto-DISABLED quand login off, OK pour iframe
      - STORAGE_ENABLED=false

      # --- UI / locale ---
      - SYSTEM_DEFAULTLOCALE=fr-FR
      - LANGS=fr_FR,en_GB
      - UI_APPNAME=Toolbox PDF
      - UI_HOMEDESCRIPTION=Instance publique — aucune donnée conservée.

      # --- Confidentialité : zéro télémétrie ---
      - SYSTEM_ENABLEANALYTICS=false
      - SYSTEM_ENABLEPOSTHOG=false
      - SYSTEM_ENABLESCARF=false
      - SYSTEM_GOOGLEVISIBILITY=false
      - SYSTEM_SHOWUPDATE=false
      - SHOW_SURVEY=false
      - METRICS_ENABLED=false

      # --- Nettoyage agressif des fichiers temporaires ---
      - SYSTEM_TEMPFILEMANAGEMENT_MAXAGEHOURS=1
      - SYSTEM_TEMPFILEMANAGEMENT_CLEANUPINTERVALMINUTES=5
      - SYSTEM_TEMPFILEMANAGEMENT_STARTUPCLEANUP=true
      - SYSTEM_TEMPFILEMANAGEMENT_CLEANUPSYSTEMTEMP=true

      # --- Désactivation des features à risque pour instance publique ---
      - SYSTEM_ENABLEURLTOPDF=false
      - SYSTEM_ENABLEMOBILESCANNER=false
      - PREMIUM_PROFEATURES_AUDIT_ENABLED=false
      - PREMIUM_ENTERPRISEFEATURES_AUDIT_ENABLED=false
    volumes:
      # Seul volume persistant : données statiques OCR Tesseract
      - stirling_tessdata:/usr/share/tessdata
    tmpfs:
      # /configs et /logs en RAM — effacés à chaque restart
      - /configs:size=64M,mode=1777
      - /logs:size=64M,mode=1777
      # /tmp également en RAM pour que les fichiers uploadés ne
      # touchent jamais le disque hôte
      - /tmp:size=512M,mode=1777
    read_only: false
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - toolbox_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ---------------------------------------------------------------
  # LibreSpeed — instance de test débit embarquée via iframe.
  #
  # Service stateless : aucune donnée utilisateur persistée par
  # Toolbox. Le port public sert uniquement à l'affichage iframe.
  # ---------------------------------------------------------------
  librespeed:
    image: lscr.io/linuxserver/librespeed:latest
    container_name: toolbox-librespeed
    ports:
      - "${LIBRESPEED_PORT:-8081}:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Paris}
      - MODE=standalone
      - TELEMETRY=false
      - ENABLE_ID_OBFUSCATION=true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - toolbox_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------
  # Redis — backend du rate limiter (Flask-Limiter).
  #
  # - In-memory only (pas de persistance disque activée) : les
  #   compteurs de rate limit sont éphémères par design.
  # - Pas de port exposé à l'extérieur : accessible uniquement
  #   depuis le réseau Docker.
  # - `--maxmemory 64mb --maxmemory-policy allkeys-lru` : pas de
  #   risque d'OOM, les clés expirées sont évincées automatiquement.
  # ---------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: toolbox-redis
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - "64mb"
      - --maxmemory-policy
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - toolbox_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 96M

networks:
  toolbox_network:
    driver: bridge

volumes:
  toolbox_uploads:
  toolbox_downloads:
  toolbox_logs:
  # Données OCR statiques Tesseract — pas de données utilisateur
  stirling_tessdata:
