{% extends 'essentials/_tool_layout.html' %}

{% block tool_input %}
<div class="tool-btn-row" role="tablist">
    <button type="button" class="tool-btn tool-btn--sm tool-btn--indigo" data-mode-btn="random" aria-selected="true">Aléatoire</button>
    <button type="button" class="tool-btn tool-btn--sm tool-btn--ghost" data-mode-btn="passphrase" aria-selected="false">Passphrase</button>
</div>

<div data-mode-panel="random" class="flex flex-col gap-3">
    <div class="tool-field">
        <label class="tool-field__label" for="pw-length">Longueur : <span data-pw-length-value>16</span></label>
        <input id="pw-length" type="range" min="8" max="64" value="16" class="tool-range">
    </div>

    <div class="tool-check-grid">
        <label class="tool-check"><input type="checkbox" id="pw-upper" checked> Majuscules</label>
        <label class="tool-check"><input type="checkbox" id="pw-lower" checked> Minuscules</label>
        <label class="tool-check"><input type="checkbox" id="pw-numbers" checked> Chiffres</label>
        <label class="tool-check"><input type="checkbox" id="pw-symbols" checked> Symboles</label>
        <label class="tool-check col-span-2"><input type="checkbox" id="pw-no-ambig" checked> Exclure les caractères ambigus (il1O0)</label>
    </div>
</div>

<div data-mode-panel="passphrase" class="flex flex-col gap-3" hidden>
    <div class="tool-field">
        <label class="tool-field__label" for="pp-words">Nombre de mots : <span data-pp-words-value>4</span></label>
        <input id="pp-words" type="range" min="3" max="10" value="4" class="tool-range">
    </div>
    <div class="tool-field">
        <label class="tool-field__label" for="pp-sep">Séparateur</label>
        <select id="pp-sep" class="tool-select">
            <option value="-" selected>tiret (-)</option>
            <option value=".">point (.)</option>
            <option value="_">underscore (_)</option>
            <option value=" ">espace</option>
        </select>
    </div>
    <label class="tool-check"><input type="checkbox" id="pp-capitalize" checked> Capitaliser chaque mot</label>
    <label class="tool-check"><input type="checkbox" id="pp-number"> Ajouter un chiffre à la fin</label>
</div>

<button id="pw-regen" class="tool-btn tool-btn--indigo tool-btn--full mt-2">
    <i class="fas fa-dice text-xs"></i> Régénérer
</button>
{% endblock %}

{% block tool_output %}
<div class="tool-field">
    <label class="tool-field__label">Mot de passe généré</label>
    <div class="tool-output__row">
        <code id="pw-result">Aucun résultat</code>
        <button class="tool-btn tool-btn--sm tool-btn--ghost" data-copy-target="#pw-result" aria-label="Copier">
            <i class="fas fa-copy text-xs"></i>
        </button>
    </div>
</div>

<div class="tool-field">
    <label class="tool-field__label">Force</label>
    <div class="tool-strength">
        <div class="tool-strength__bar">
            <div id="pw-strength-fill" class="tool-strength__fill" style="width: 0; background: #94a3b8;"></div>
        </div>
        <span id="pw-strength-level" class="tool-field__hint">Aucun résultat</span>
    </div>
    <p id="pw-strength-hint" class="tool-field__hint"></p>
</div>
{% endblock %}
