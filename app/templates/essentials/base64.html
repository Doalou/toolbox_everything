{% extends 'essentials/_tool_layout.html' %}

{% block tool_input %}
<div class="tool-btn-row">
    <button type="button" class="tool-btn tool-btn--sm tool-btn--indigo" data-b64-mode="encode" aria-selected="true">Encoder</button>
    <button type="button" class="tool-btn tool-btn--sm tool-btn--ghost" data-b64-mode="decode" aria-selected="false">Décoder</button>
    <label class="tool-check ml-auto"><input type="checkbox" id="b64-urlsafe"> URL-safe</label>
</div>

<div class="tool-field">
    <label class="tool-field__label" for="b64-input">Entrée</label>
    <textarea id="b64-input" class="tool-textarea" placeholder="Tapez du texte ou du base64"></textarea>
</div>
{% endblock %}

{% block tool_output %}
<div class="tool-field">
    <label class="tool-field__label">Résultat</label>
    <textarea id="b64-output" class="tool-textarea" readonly placeholder="Le résultat apparaîtra ici"></textarea>
    <div class="tool-btn-row">
        <button class="tool-btn tool-btn--sm tool-btn--ghost" data-copy-target="#b64-output">
            <i class="fas fa-copy text-xs"></i> Copier
        </button>
    </div>
</div>
{% endblock %}
